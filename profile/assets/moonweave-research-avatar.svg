<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Moonweave Research avatar</title>
  <desc id="desc">A stack of papers connected to evidence graph nodes.</desc>
  <defs>
    <radialGradient id="bg" cx="38%" cy="25%" r="84%">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="0.58" stop-color="#0b1320"/>
      <stop offset="1" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="paper" x1="314" y1="260" x2="720" y2="762" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#b7d6cc"/>
    </linearGradient>
    <linearGradient id="link" x1="238" y1="746" x2="778" y2="322" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6f5e3"/>
      <stop offset="0.5" stop-color="#39c5cf"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <path d="M308 290h342l88 88v370H308z" fill="#0b1320" stroke="#2ea043" stroke-width="22" opacity="0.7"/>
  <path d="M356 250h326l92 92v368H356z" fill="url(#paper)"/>
  <path d="M682 250v94h92" fill="none" stroke="#7aa99b" stroke-width="18" stroke-linejoin="round"/>
  <path d="M438 422h214M438 502h252M438 582h188" stroke="#1f6f5b" stroke-width="28" stroke-linecap="round" opacity="0.72"/>
  <path d="M254 738c100-72 174-82 248-41 78 43 155 23 270-107" fill="none" stroke="url(#link)" stroke-width="28" stroke-linecap="round"/>
  <path d="M254 738l162-196 162 86 194-306" fill="none" stroke="#39c5cf" stroke-width="10" stroke-linecap="round" opacity="0.52"/>
  <g filter="url(#glow)">
    <circle cx="254" cy="738" r="28" fill="#d6f5e3"/>
    <circle cx="416" cy="542" r="22" fill="#39c5cf"/>
    <circle cx="578" cy="628" r="22" fill="#f2cc60"/>
    <circle cx="772" cy="322" r="28" fill="#2ea043"/>
  </g>
</svg>
