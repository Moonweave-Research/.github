<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Moonweave Research avatar</title>
  <desc id="desc">A crescent moon with orbiting research nodes and a woven evidence trail.</desc>
  <defs>
    <radialGradient id="bg" cx="35%" cy="25%" r="82%">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="0.56" stop-color="#0b1320"/>
      <stop offset="1" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="trail" x1="238" y1="718" x2="820" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6f5e3"/>
      <stop offset="0.45" stop-color="#39c5cf"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="356" fill="none" stroke="#2ea043" stroke-width="18" opacity="0.25"/>
  <ellipse cx="512" cy="512" rx="372" ry="194" fill="none" stroke="#39c5cf" stroke-width="10" opacity="0.22" transform="rotate(-24 512 512)"/>
  <ellipse cx="512" cy="512" rx="300" ry="138" fill="none" stroke="#f2cc60" stroke-width="6" opacity="0.18" transform="rotate(28 512 512)"/>

  <path d="M640 217c-128 19-226 130-226 264 0 148 120 268 268 268 39 0 76-8 110-23-58 78-151 128-256 128-177 0-320-143-320-320 0-156 111-285 259-314 55-11 110-10 165-3z" fill="#f0f6fc"/>
  <path d="M640 217c-128 19-226 130-226 264 0 49 13 95 36 135-67-33-113-102-113-182 0-105 80-193 183-202 39-4 79-7 120-15z" fill="#2ea043" opacity="0.15"/>

  <path d="M246 702c88-73 169-82 254-46 84 36 167 27 278-87" fill="none" stroke="url(#trail)" stroke-width="28" stroke-linecap="round"/>
  <path d="M276 768c93-49 164-53 236-22 75 32 146 16 240-65" fill="none" stroke="#39c5cf" stroke-width="14" stroke-linecap="round" opacity="0.76"/>

  <g filter="url(#softGlow)">
    <circle cx="246" cy="702" r="24" fill="#d6f5e3"/>
    <circle cx="500" cy="656" r="20" fill="#39c5cf"/>
    <circle cx="778" cy="569" r="26" fill="#2ea043"/>
    <circle cx="321" cy="370" r="15" fill="#f2cc60"/>
    <circle cx="732" cy="314" r="17" fill="#39c5cf"/>
  </g>
</svg>
